<div class="min-h-screen flex flex-col pt-16">
  <div class="container mx-auto px-4 py-8 flex-grow">
    <a routerLink="/" fragment="portfolio" class="inline-flex items-center gap-2 text-gray-300 hover:text-emerald-400 transition-colors mb-8">
      <lucide-icon name="arrow-left" [size]="20"></lucide-icon>
      Volver al portfolio
    </a>

    <ng-container *ngIf="project(); else notFound">
      <article class="max-w-4xl mx-auto">
        <h1 class="text-3xl md:text-4xl font-bold text-white mb-4">{{ project()!.name }}</h1>
        <p class="text-xl text-gray-300 mb-6" *ngIf="project()!.category">
          <span class="text-accent font-medium">{{ project()!.category }}</span>
        </p>

        <div class="flex flex-wrap gap-2 mb-8">
          <span *ngFor="let tag of tags()"
            class="inline-flex items-center px-2.5 py-1 bg-accent/10 text-accent text-sm font-medium rounded-full">
            <lucide-icon [name]="getTagIcon(tag)" [size]="14" class="mr-1.5"></lucide-icon>
            {{ tag }}
          </span>
        </div>

        <div class="prose prose-invert max-w-none mb-10">
          <p class="text-lg text-gray-300 leading-relaxed" *ngIf="project()!.description">
            {{ project()!.description }}
          </p>
          <p class="text-gray-300 leading-relaxed mt-4" *ngIf="project()!.longDescription">
            {{ project()!.longDescription }}
          </p>
        </div>

        <!-- Imagen principal (antes/después o portada) -->
        <section class="mb-12" *ngIf="project()!.imageAfter || project()!.imageBefore">
          <h2 class="text-xl font-semibold text-white mb-4">Imágenes del proyecto</h2>
          <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <figure class="rounded-lg overflow-hidden bg-secondary" *ngIf="project()!.imageBefore">
              <img [src]="project()!.imageBefore!" [alt]="project()!.name + ' - Antes'" class="w-full h-auto object-cover">
              <figcaption class="p-2 text-sm text-gray-400 text-center">Antes</figcaption>
            </figure>
            <figure class="rounded-lg overflow-hidden bg-secondary" *ngIf="project()!.imageAfter">
              <img [src]="project()!.imageAfter!" [alt]="project()!.name + ' - Después'" class="w-full h-auto object-cover">
              <figcaption class="p-2 text-sm text-gray-400 text-center">Después</figcaption>
            </figure>
          </div>
        </section>

        <!-- Galería -->
        <section class="mb-12" *ngIf="gallerySorted().length">
          <h2 class="text-xl font-semibold text-white mb-4">Galería</h2>
          <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
            <figure *ngFor="let img of gallerySorted()" class="rounded-lg overflow-hidden bg-secondary">
              <img [src]="img.url" [alt]="project()!.name + ' - ' + img.id" class="w-full h-56 object-cover">
            </figure>
          </div>
        </section>

        <!-- Vídeos -->
        <section class="mb-12" *ngIf="videoUrls().length">
          <h2 class="text-xl font-semibold text-white mb-4">Vídeos</h2>
          <div class="space-y-6">
            <div *ngFor="let videoUrl of videoUrls()" class="rounded-lg overflow-hidden bg-secondary aspect-video max-w-3xl">
              <video *ngIf="isVideoUrl(videoUrl)" [src]="videoUrl" controls class="w-full h-full object-contain"></video>
              <iframe *ngIf="!isVideoUrl(videoUrl) && isEmbedUrl(videoUrl)" [src]="getSafeVideoUrl(videoUrl)" class="w-full h-full" allowfullscreen></iframe>
              <a *ngIf="!isVideoUrl(videoUrl) && !isEmbedUrl(videoUrl)" [href]="videoUrl" target="_blank" rel="noopener noreferrer"
                class="flex items-center justify-center h-full text-accent hover:underline">
                Ver vídeo externo
              </a>
            </div>
          </div>
        </section>

        <div class="pt-6 border-t border-gray-700" *ngIf="projectUrl()">
          <a [href]="projectUrl()!" target="_blank" rel="noopener noreferrer"
            class="inline-flex items-center gap-2 px-6 py-3 bg-accent/20 hover:bg-accent/30 text-accent font-semibold rounded-lg transition-colors">
            <lucide-icon name="external-link" [size]="20"></lucide-icon>
            Ver proyecto / demo
          </a>
        </div>
      </article>
    </ng-container>

    <ng-template #notFound>
      <div class="text-center py-16">
        <p class="text-xl text-gray-400 mb-6" *ngIf="isLoading()">Cargando proyecto...</p>
        <p class="text-xl text-gray-400 mb-6" *ngIf="!isLoading()">Proyecto no encontrado.</p>
        <a routerLink="/" fragment="portfolio" class="inline-flex items-center gap-2 text-accent hover:underline">
          <lucide-icon name="arrow-left" [size]="20"></lucide-icon>
          Volver al portfolio
        </a>
      </div>
    </ng-template>
  </div>
</div>
