<div class="app-shell relative min-h-screen">
  <div class="app-background" aria-hidden="true"></div>

  <div class="relative z-10">
    <div class="min-h-screen flex flex-col">
      <nav class="fixed top-0 left-0 right-0 z-50 border-b border-white/5 bg-primary/85 backdrop-blur-md">
        <div class="container mx-auto px-4">
          <div class="flex items-center justify-between h-16">
            <a routerLink="/" class="text-xl font-bold text-emerald-400" data-testid="app-logo">LV</a>
            <div class="hidden md:flex items-center space-x-8">
              <a routerLink="/" fragment="services" class="text-gray-300 hover:text-emerald-400 transition-colors" data-testid="app-services-link">Qué hago</a>
              <a routerLink="/" fragment="portfolio" class="text-gray-300 hover:text-emerald-400 transition-colors" data-testid="app-portfolio-link">Trabajos</a>
              <a routerLink="/" fragment="about" class="text-gray-300 hover:text-emerald-400 transition-colors" data-testid="app-about-link">Sobre mí</a>
              <a routerLink="/" fragment="contact" class="text-gray-300 hover:text-emerald-400 transition-colors" data-testid="app-contact-link">Contacto</a>
              <a routerLink="/" fragment="contact" class="inline-flex items-center justify-center px-4 py-2 border border-accent text-accent font-semibold rounded-lg transition-colors hover:bg-accent hover:text-primary" data-testid="app-cta-link">Hablemos</a>
            </div>
            <button (click)="toggleMobileMenu()" class="md:hidden text-gray-300 hover:text-emerald-400 transition-colors" aria-label="Abrir menú" data-testid="app-mobile-menu-button">
              <lucide-icon [name]="isMobileMenuOpen ? 'x' : 'menu'" [size]="24"></lucide-icon>
            </button>
          </div>
          <!-- Mobile menu -->
          <div class="md:hidden" [class.hidden]="!isMobileMenuOpen">
            <div class="px-2 pt-2 pb-3 space-y-1">
              <a routerLink="/" fragment="services" (click)="toggleMobileMenu()" class="block px-3 py-2 text-gray-300 hover:text-emerald-400 transition-colors" data-testid="app-mobile-services-link">Qué hago</a>
              <a routerLink="/" fragment="portfolio" (click)="toggleMobileMenu()" class="block px-3 py-2 text-gray-300 hover:text-emerald-400 transition-colors" data-testid="app-mobile-portfolio-link">Trabajos</a>
              <a routerLink="/" fragment="about" (click)="toggleMobileMenu()" class="block px-3 py-2 text-gray-300 hover:text-emerald-400 transition-colors" data-testid="app-mobile-about-link">Sobre mí</a>
              <a routerLink="/" fragment="contact" (click)="toggleMobileMenu()" class="block px-3 py-2 text-gray-300 hover:text-emerald-400 transition-colors" data-testid="app-mobile-contact-link">Contacto</a>
              <a routerLink="/" fragment="contact" (click)="toggleMobileMenu()" class="block px-3 py-2 text-accent font-semibold hover:text-emerald-400 transition-colors" data-testid="app-mobile-cta-link">Hablemos</a>
            </div>
          </div>
        </div>
      </nav>

      <router-outlet></router-outlet>
    </div>
  </div>
</div>
